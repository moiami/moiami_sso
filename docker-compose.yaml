name: 'SSO'
services:
  db:
    image: postgres:latest
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres

  sso:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - db