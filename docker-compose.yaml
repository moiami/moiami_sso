name: 'SSO'
services:
  postgres-sso-service:
    image: postgres:latest
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    command: ["postgres", "-p", "5433"]

  sso:
    build: .
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      - postgres-sso-service